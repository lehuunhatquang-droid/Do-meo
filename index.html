<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧠 Đố Mẹo Hack Não – 100 Câu</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Mulish:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf7f2;
  --card: #ffffff;
  --ink: #1a1208;
  --muted: #8a7e6e;
  --accent: #e8622a;
  --accent2: #2a7de8;
  --accent3: #27a06e;
  --warn: #e8b62a;
  --border: #e8e0d4;
  --shadow: rgba(26,18,8,0.08);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Mulish', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  background-image:
    radial-gradient(circle at 15% 15%, rgba(232,98,42,0.06) 0%, transparent 40%),
    radial-gradient(circle at 85% 85%, rgba(42,125,232,0.05) 0%, transparent 40%);
}

/* ── HEADER ── */
header {
  position: sticky; top: 0; z-index: 50;
  background: rgba(250,247,242,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex; align-items: center; gap: 16px;
}

.logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.2rem;
  color: var(--accent);
  letter-spacing: -0.5px;
  flex-shrink: 0;
}

.header-meta {
  display: flex; align-items: center; gap: 12px;
  margin-left: auto;
  flex-shrink: 0;
}

.badge {
  background: var(--ink);
  color: var(--bg);
  font-family: 'Syne', sans-serif;
  font-size: 0.78rem;
  font-weight: 700;
  padding: 5px 12px;
  border-radius: 999px;
  letter-spacing: 0.3px;
}

.badge.score { background: var(--accent3); }
.badge.streak { background: var(--accent); }

/* ── PROGRESS BAR ── */
.prog-bar-wrap {
  height: 3px;
  background: var(--border);
  position: sticky; top: 57px; z-index: 49;
}
.prog-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--warn));
  transition: width 0.4s ease;
}

/* ── MAIN LAYOUT ── */
main {
  max-width: 720px;
  margin: 0 auto;
  padding: 32px 20px 80px;
}

/* ── CATEGORY FILTER ── */
.categories {
  display: flex; flex-wrap: wrap; gap: 8px;
  margin-bottom: 28px;
  animation: fadeUp 0.5s ease;
}

.cat-btn {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 999px;
  font-family: 'Mulish', sans-serif;
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--muted);
  padding: 6px 16px;
  cursor: pointer;
  transition: all 0.18s;
}
.cat-btn:hover { border-color: var(--accent); color: var(--accent); }
.cat-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

/* ── RIDDLE CARD ── */
.card {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 28px 28px 24px;
  margin-bottom: 16px;
  box-shadow: 0 2px 16px var(--shadow);
  transition: all 0.2s;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  animation: fadeUp 0.4s ease;
}

.card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  background: var(--border);
  transition: background 0.2s;
}

.card.revealed::before { background: var(--accent3); }
.card.skipped::before { background: var(--muted); }

.card:hover { transform: translateY(-2px); box-shadow: 0 6px 28px var(--shadow); }

.card-top {
  display: flex; align-items: flex-start; gap: 14px;
  margin-bottom: 0;
}

.card-num {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 0.75rem;
  color: var(--muted);
  letter-spacing: 1px;
  flex-shrink: 0;
  margin-top: 3px;
  min-width: 32px;
}

.card-body { flex: 1; }

.card-category {
  display: inline-block;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 8px;
}

.card-question {
  font-family: 'Syne', sans-serif;
  font-size: 1.05rem;
  font-weight: 600;
  line-height: 1.55;
  color: var(--ink);
}

.card-emoji {
  font-size: 2rem;
  flex-shrink: 0;
  line-height: 1;
}

/* ── ANSWER SECTION ── */
.answer-wrap {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.3s;
  opacity: 0;
}

.answer-wrap.open {
  max-height: 200px;
  opacity: 1;
}

.answer-divider {
  height: 1px;
  background: var(--border);
  margin: 18px 0 16px 0;
}

.answer-label {
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}

.answer-text {
  font-family: 'Syne', sans-serif;
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--accent3);
  line-height: 1.5;
}

.card-hint {
  font-size: 0.82rem;
  color: var(--muted);
  margin-top: 6px;
  line-height: 1.5;
  font-style: italic;
}

/* ── CARD ACTIONS ── */
.card-actions {
  display: flex; gap: 8px;
  margin-top: 16px;
  max-height: 0; overflow: hidden; opacity: 0;
  transition: max-height 0.3s, opacity 0.3s;
}

.card-actions.open { max-height: 60px; opacity: 1; }

.act-btn {
  border: 1.5px solid var(--border);
  border-radius: 10px;
  background: var(--bg);
  font-family: 'Mulish', sans-serif;
  font-size: 0.78rem;
  font-weight: 700;
  padding: 7px 14px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex; align-items: center; gap: 5px;
}

.act-btn:hover { background: var(--ink); color: var(--bg); border-color: var(--ink); }
.act-btn.got-it { border-color: var(--accent3); color: var(--accent3); }
.act-btn.got-it:hover { background: var(--accent3); color: white; border-color: var(--accent3); }
.act-btn.skip { border-color: var(--muted); color: var(--muted); }

/* Reveal hint */
.reveal-hint {
  text-align: center;
  font-size: 0.75rem;
  color: var(--muted);
  margin-top: 14px;
  display: flex; align-items: center; justify-content: center; gap-6px;
}

/* ── STATS BAR ── */
.stats-bar {
  display: flex; gap: 12px;
  margin-bottom: 24px;
  animation: fadeUp 0.5s 0.1s ease both;
}

.stat-chip {
  flex: 1;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  text-align: center;
  box-shadow: 0 2px 8px var(--shadow);
}

.stat-chip .num {
  font-family: 'Syne', sans-serif;
  font-size: 1.6rem;
  font-weight: 800;
  line-height: 1;
  color: var(--ink);
}

.stat-chip .lbl {
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 3px;
}

.stat-chip.correct .num { color: var(--accent3); }
.stat-chip.wrong-stat .num { color: var(--accent); }
.stat-chip.streak-stat .num { color: var(--warn); }

/* ── SECTION TITLE ── */
.section-title {
  font-family: 'Syne', sans-serif;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}

/* ── EMPTY STATE ── */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}
.empty .emoji { font-size: 3rem; margin-bottom: 12px; }
.empty p { font-size: 0.9rem; }

/* ── SEARCH ── */
.search-wrap {
  position: relative;
  margin-bottom: 20px;
  animation: fadeUp 0.5s 0.05s ease both;
}

.search-input {
  width: 100%;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  font-family: 'Mulish', sans-serif;
  font-size: 0.92rem;
  color: var(--ink);
  padding: 13px 18px 13px 44px;
  outline: none;
  transition: border-color 0.2s;
  box-shadow: 0 2px 8px var(--shadow);
}

.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--muted); }

.search-icon {
  position: absolute;
  left: 16px; top: 50%; transform: translateY(-50%);
  font-size: 1rem;
  pointer-events: none;
}

/* ── CONFETTI ── */
.confetti-p {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  border-radius: 3px;
  animation: cfall linear forwards;
}
@keyframes cfall {
  to { top: 110vh; transform: rotate(720deg) translateX(var(--dx)); opacity: 0; }
}

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--ink);
  color: var(--bg);
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 0.9rem;
  padding: 12px 24px;
  border-radius: 999px;
  z-index: 999;
  opacity: 0;
  transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  white-space: nowrap;
  pointer-events: none;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── COMPLETE BANNER ── */
.complete-banner {
  display: none;
  background: linear-gradient(135deg, var(--accent3), #1e7a52);
  border-radius: 20px;
  padding: 32px;
  text-align: center;
  color: white;
  margin-bottom: 24px;
  animation: fadeUp 0.5s ease;
}
.complete-banner.show { display: block; }
.complete-banner h2 {
  font-family: 'Syne', sans-serif;
  font-size: 1.8rem;
  font-weight: 800;
  margin-bottom: 8px;
}
.complete-banner p { opacity: 0.85; font-size: 0.95rem; margin-bottom: 20px; }
.complete-banner button {
  background: white;
  color: var(--accent3);
  border: none;
  border-radius: 12px;
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 0.95rem;
  padding: 12px 28px;
  cursor: pointer;
  transition: all 0.2s;
}
.complete-banner button:hover { transform: scale(1.04); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<header>
  <div class="logo">🧠 Đố Mẹo</div>
  <div id="headerProg" style="flex:1;font-size:0.78rem;color:var(--muted);font-weight:600;"></div>
  <div class="header-meta">
    <div class="badge score" id="hScore">✅ 0</div>
    <div class="badge streak" id="hStreak">🔥 0</div>
  </div>
</header>
<div class="prog-bar-wrap"><div class="prog-bar" id="progBar" style="width:0%"></div></div>

<main>
  <div class="stats-bar">
    <div class="stat-chip correct"><div class="num" id="statCorrect">0</div><div class="lbl">Đúng</div></div>

    <div class="stat-chip streak-stat"><div class="num" id="statStreak">0</div><div class="lbl">Chuỗi 🔥</div></div>
  </div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="searchInput" placeholder="Tìm câu đố..." oninput="filterCards()" />
  </div>

  <div class="categories" id="catFilter"></div>

  <div class="complete-banner" id="completeBanner">
    <h2>🎉 Xuất sắc!</h2>

    <button onclick="resetAll()">🔄 Chơi lại từ đầu</button>

  <div class="section-title">
    <span id="sectionLabel">Tất cả câu đố</span>
    <span id="sectionCount" style="font-size:0.7rem;color:var(--muted)"></span>

  <div id="cardList"></div>
</main>

<div class="toast" id="toast"></div>

let revealed = new Set(JSON.parse(localStorage.getItem('rev') || '[]'));
let correct = new Set(JSON.parse(localStorage.getItem('cor') || '[]'));
let wrong = new Set(JSON.parse(localStorage.getItem('wrg') || '[]'));
let streak = parseInt(localStorage.getItem('streak') || '0');
let bestStreak = parseInt(localStorage.getItem('bestStreak') || '0');
let activeCategory = 'Tất cả';
let searchQ = '';

function save() {
  localStorage.setItem('rev', JSON.stringify([...revealed]));
  localStorage.setItem('cor', JSON.stringify([...correct]));
  localStorage.setItem('wrg', JSON.stringify([...wrong]));
  localStorage.setItem('streak', streak);
  localStorage.setItem('bestStreak', bestStreak);
}

    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (c === activeCategory ? ' active' : '');
    const count = c === 'Tất cả' ? RIDDLES.length : RIDDLES.filter(r => r.cat === c).length;
    btn.textContent = `${c} (${count})`;
    btn.onclick = () => { activeCategory = c; buildCatFilter(); renderCards(); };
    wrap.appendChild(btn);
  });
}

// ── RENDER ──
function getFiltered() {
  return RIDDLES.filter(r => {
    const matchCat = activeCategory === 'Tất cả' || r.cat === activeCategory;
    const q = searchQ.toLowerCase();
    const matchSearch = !q || r.q.toLowerCase().includes(q) || r.a.toLowerCase().includes(q);
    return matchCat && matchSearch;
  });
}

function renderCards() {
  const list = document.getElementById('cardList');
  const filtered = getFiltered();

  document.getElementById('sectionLabel').textContent =
    activeCategory === 'Tất cả' ? 'Tất cả câu đố' : activeCategory;
  document.getElementById('sectionCount').textContent = `${filtered.length} câu`;

  if (!filtered.length) {
    list.innerHTML = `<div class="empty"><div class="emoji">🔍</div><p>Không tìm thấy câu đố nào phù hợp!</p></div>`;
    return;
  }

  list.innerHTML = '';
  filtered.forEach((r, idx) => {
    const isRevealed = revealed.has(r.id);
    const isCorrect = correct.has(r.id);
    const isWrong = wrong.has(r.id);

    const card = document.createElement('div');
    card.className = 'card' + (isCorrect ? ' revealed' : isWrong ? ' skipped' : '');
    card.id = `card-${r.id}`;
    card.style.animationDelay = `${Math.min(idx * 0.03, 0.5)}s`;

    card.innerHTML = `
      <div class="card-top">
        <div class="card-num">#${r.id}</div>
        <div class="card-body">
          <div class="card-category">${r.cat}</div>
          <div class="card-question">${r.q}</div>
        </div>
        <div class="card-emoji">${r.emoji}</div>
      </div>
      <div class="answer-wrap ${isRevealed ? 'open' : ''}" id="ans-${r.id}">
        <div class="answer-divider"></div>
        <div class="answer-label">Đáp án</div>
        <div class="answer-text">${r.a}</div>
        ${r.hint ? `<div class="card-hint">💡 ${r.hint}</div>` : ''}
      </div>
      <div class="card-actions ${isRevealed && !isCorrect && !isWrong ? 'open' : ''}" id="acts-${r.id}">
        <button class="act-btn got-it" onclick="markCorrect(${r.id}, event)">✅ Tôi đã biết!</button>
        <button class="act-btn skip" onclick="markWrong(${r.id}, event)">😅 Chưa biết</button>
      </div>
      ${!isRevealed ? `<div class="reveal-hint" style="margin-top:14px;font-size:0.74rem;color:var(--muted)">👆 Nhấn để xem đáp án</div>` : ''}
    `;

    card.addEventListener('click', (e) => {
      if (e.target.classList.contains('act-btn')) return;
      toggleReveal(r.id);
    });

    list.appendChild(card);
  });

  updateStats();
  checkComplete();
}

function toggleReveal(id) {
  const ansWrap = document.getElementById(`ans-${id}`);
  const actsWrap = document.getElementById(`acts-${id}`);
  const card = document.getElementById(`card-${id}`);

  if (!revealed.has(id)) {
    revealed.add(id);
    ansWrap.classList.add('open');
    // Show actions if not already rated
    if (!correct.has(id) && !wrong.has(id)) {
      actsWrap.classList.add('open');
    }
    // Remove hint
    const hint = card.querySelector('.reveal-hint');
    if (hint) hint.remove();
    save();
  } else {
    revealed.delete(id);
    ansWrap.classList.remove('open');
    actsWrap.classList.remove('open');
    // Re-add hint
    if (!card.querySelector('.reveal-hint')) {
      const h = document.createElement('div');
      h.className = 'reveal-hint';
      h.style.cssText = 'margin-top:14px;font-size:0.74rem;color:var(--muted)';
      h.textContent = '👆 Nhấn để xem đáp án';
      card.appendChild(h);
    }
    save();
  }
  updateStats();
}

function markCorrect(id, e) {
  e.stopPropagation();
  correct.add(id);
  wrong.delete(id);
  streak++;
  if (streak > bestStreak) bestStreak = streak;
  document.getElementById(`card-${id}`).classList.add('revealed');
  document.getElementById(`card-${id}`).classList.remove('skipped');
  document.getElementById(`acts-${id}`).classList.remove('open');
  save();
  updateStats();
  spawnConfetti();
  showToast(streak >= 5 ? `🔥 Chuỗi ${streak}! Tuyệt vời!` : '✅ Đúng rồi!');
  checkComplete();
}

function markWrong(id, e) {
  e.stopPropagation();
  wrong.add(id);
  correct.delete(id);
  streak = 0;
  document.getElementById(`card-${id}`).classList.add('skipped');
  document.getElementById(`card-${id}`).classList.remove('revealed');
  document.getElementById(`acts-${id}`).classList.remove('open');
  save();
  updateStats();
  showToast('😅 Không sao, xem lại nhé!');
}

function updateStats() {
  const total = RIDDLES.length;
  const c = correct.size;
  const w = wrong.size;
  const left = total - c - w;
  const pct = ((c + w) / total) * 100;

  document.getElementById('statCorrect').textContent = c;
  document.getElementById('statWrong').textContent = w;
  document.getElementById('statLeft').textContent = left;
  document.getElementById('statStreak').textContent = streak;
  document.getElementById('progBar').style.width = pct + '%';
  document.getElementById('hScore').textContent = `✅ ${c}`;
  document.getElementById('hStreak').textContent = `🔥 ${streak}`;
  document.getElementById('headerProg').textContent = `${c + w}/${total} đã xem`;
}

function checkComplete() {
  const done = correct.size + wrong.size;
  const banner = document.getElementById('completeBanner');
  if (done >= RIDDLES.length) {
    banner.classList.add('show');
    document.getElementById('completeText').textContent =
      `🎉 Bạn đúng ${correct.size}/100 câu! Chuỗi dài nhất: ${bestStreak} 🔥`;
    spawnConfetti(60);
  } else {
    banner.classList.remove('show');
  }
}

function resetAll() {
  revealed.clear(); correct.clear(); wrong.clear();
  streak = 0; bestStreak = 0;
  localStorage.clear();
  save();
  renderCards();
  document.getElementById('completeBanner').classList.remove('show');
  showToast('🔄 Đã đặt lại tất cả!');
}

function filterCards() {
  searchQ = document.getElementById('searchInput').value;
  renderCards();
}

// ── TOAST ──
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// ── CONFETTI ──
function spawnConfetti(count = 18) {
  const colors = ['#e8622a','#2a7de8','#27a06e','#e8b62a','#e82a7d','#7d2ae8'];
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'confetti-p';
      const size = Math.random() * 9 + 5;
      p.style.cssText = `
        left:${Math.random()*100}vw;top:-10px;
        width:${size}px;height:${size}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        border-radius:${Math.random()>.5?'50%':'2px'};
        --dx:${(Math.random()-.5)*150}px;
        animation-duration:${Math.random()*1.5+1.2}s;
        animation-delay:${Math.random()*0.4}s;
      `;
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 2500);
    }, i * 40);
  }
}

// ── INIT ──
buildCatFilter();
renderCards();
</script>
</body>
</html>
